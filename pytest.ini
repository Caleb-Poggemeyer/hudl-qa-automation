# Pytest config — runs tests in /tests and generates an HTML report
[pytest]
testpaths = tests
addopts =
    --html=reports/report.html
    --self-contained-html
    -v
markers =
    smoke: Happy-path tests that verify core login functionality
    security: Tests for injection attempts, boundary inputs, and rate limiting
    navigation: Tests for browser back/forward flow behaviour
    sso: Tests for third-party SSO entry points (Google, Apple, Facebook)
    accessibility: Tests for keyboard navigation and tab order
